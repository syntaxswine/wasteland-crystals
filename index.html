<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WASTELAND CRYSTALS</title>
  <style>
    body {
      margin: 0;
      padding: 2em;
      background: #050505;
      color: #d4af37;
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
      font-size: 14px;
      line-height: 1.5;
    }
    h1 {
      font-weight: normal;
      font-size: 1.6em;
      letter-spacing: 0.15em;
      margin: 0 0 1em 0;
      border-bottom: 1px solid #5c4a1a;
      padding-bottom: 0.5em;
    }
    pre#boot-log {
      color: #b48a2c;
      white-space: pre-wrap;
    }
    .dim { color: #5c4a1a; }
  </style>
</head>
<body>
  <h1>WASTELAND CRYSTALS — BOOT</h1>
  <pre id="boot-log">[INIT] no engine loaded yet</pre>
  <script>
    // === BUILD:bundle:start ===
// auto-generated by `npm run build` from js/**/*.ts — edit those files, not this block

// ── 15-version.js ──

// ============================================================
// js/15-version.ts — WASTELAND_VERSION + per-bump engine-drift history
// ============================================================
//
// Monotonic version tag bumped by any change that could shift seed-42
// output for any scenario. Mirrors the SIM_VERSION pattern from
// vugg-simulator (this codebase derives from that one).
//
// Bump rule: any change to chemistry math, nucleation gates, growth
// engines, or scenario initial conditions must bump WASTELAND_VERSION
// and regenerate baselines.
//
//   v0 — empty skeleton (2026-05-07): build pipeline online, no minerals,
//        no scenarios, no engine. Verifies tsc + tools/build.mjs work
//        on an empty source tree. First mineral (goslarite ZnSO4·7H2O
//        on galvanized steel) is the next step.
const WASTELAND_VERSION = "v0";

    // === BUILD:bundle:end ===

    (function () {
      var lines = ["[INIT] wasteland-crystals shell loaded"];
      if (typeof WASTELAND_VERSION !== "undefined") {
        lines.push("[INIT] WASTELAND_VERSION = " + WASTELAND_VERSION);
      } else {
        lines.push("[WARN] WASTELAND_VERSION not defined — bundle may be empty");
      }
      lines.push("[INIT] no scenarios, no minerals, no chemistry — skeleton only");
      document.getElementById("boot-log").textContent = lines.join("\n");
    })();
  </script>
</body>
</html>
