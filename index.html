<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WASTELAND CRYSTALS</title>
  <style>
    body {
      margin: 0;
      padding: 2em;
      background: #050505;
      color: #d4af37;
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
      font-size: 14px;
      line-height: 1.5;
    }
    h1 {
      font-weight: normal;
      font-size: 1.6em;
      letter-spacing: 0.15em;
      margin: 0 0 1em 0;
      border-bottom: 1px solid #5c4a1a;
      padding-bottom: 0.5em;
    }
    pre#boot-log {
      color: #b48a2c;
      white-space: pre-wrap;
    }
    .dim { color: #5c4a1a; }

    /* ── View-state toggle ──
       The page is a two-state machine: title (boot log + BEGIN menu) and
       cell (schematic + examination panel + back button). body.view-title
       hides the cell-screen elements; body.view-cell hides the title-screen
       elements. Default state is title; clicking a BEGIN button transitions
       to cell; the back button returns to title. */
    body.view-title #back-nav,
    body.view-title #schematic-container,
    body.view-title #examine-panel { display: none; }

    body.view-cell #boot-log,
    body.view-cell #begin-header,
    body.view-cell #scenario-selector { display: none; }

    /* BEGIN header — sits above the scenario buttons on the title screen.
       Same letter-spaced amber register as the section labels in the
       schematic title block, slightly larger to read as a verb-prompt. */
    div#begin-header {
      margin: 1.2em 0 0.5em 0;
      color: #d4af37;
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
      font-size: 13px;
      letter-spacing: 0.20em;
    }

    /* Back navigation — appears at the top of the cell view; styled
       like the scenario-selector buttons but as a single back-arrow chip. */
    nav#back-nav {
      margin: 0.5em 0 0.75em 0;
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
    }
    nav#back-nav button {
      background: transparent;
      border: 1px solid #5c4a1a;
      color: #b48a2c;
      padding: 0.3em 0.9em;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
    }
    nav#back-nav button:hover {
      border-color: #d4af37;
      color: #d4af37;
    }

    /* Scenario selector — boxed cyber-engineering button row sitting above
       the schematic. Active button reverses fill/stroke so it reads as
       'this is the cell currently on the work-table'. */
    nav#scenario-selector {
      margin: 0.5em 0 0.75em 0;
      display: flex;
      gap: 0.5em;
      flex-wrap: wrap;
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
    }
    nav#scenario-selector button {
      background: transparent;
      border: 1px solid #5c4a1a;
      color: #b48a2c;
      padding: 0.3em 0.9em;
      cursor: pointer;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
    }
    nav#scenario-selector button:hover {
      border-color: #d4af37;
      color: #d4af37;
    }
    nav#scenario-selector button.active {
      background: #1a1308;
      border-color: #d4af37;
      color: #d4af37;
    }

    /* Examination panel — populated when a crystal dot is clicked. Boxed
       cyber-engineering register matching the scenario selector and the
       schematic title block. Header tells you which cell the narrative
       is being read against; body is the surveyor's paragenesis. */
    aside#examine-panel {
      margin: 0.75em 0 0 0;
      border: 1px solid #5c4a1a;
      padding: 1em 1.2em;
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.55;
      color: #b48a2c;
      background: #0a0905;
      max-width: 1100px;
    }
    aside#examine-panel .header {
      color: #d4af37;
      letter-spacing: 0.12em;
      font-size: 11px;
      border-bottom: 1px solid #3c2e0e;
      padding-bottom: 0.4em;
      margin-bottom: 0.7em;
    }
    aside#examine-panel .mineral-name {
      color: #d4af37;
      font-size: 16px;
      letter-spacing: 0.10em;
      margin: 0;
    }
    aside#examine-panel .mineral-formula {
      color: #d4af37;
      font-size: 14px;
      margin-left: 0.5em;
      opacity: 0.85;
    }
    aside#examine-panel .meta {
      margin: 0.6em 0 1em 0;
      color: #8c6c1c;
      font-size: 11px;
      letter-spacing: 0.05em;
    }
    aside#examine-panel .meta span.label { color: #5c4a1a; }
    aside#examine-panel .meta span.divider { color: #3c2e0e; padding: 0 0.6em; }
    aside#examine-panel .meta span.host-none { color: #6c5418; font-style: italic; }
    aside#examine-panel .paragenesis {
      color: #c0a050;
      white-space: pre-wrap;
    }
    aside#examine-panel .citations {
      margin-top: 1em;
      color: #6c5418;
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    aside#examine-panel .fallback-note {
      color: #c0683c;
      font-size: 11px;
      margin-top: 0.8em;
      letter-spacing: 0.04em;
    }
    aside#examine-panel .idle {
      color: #5c4a1a;
      font-style: italic;
    }
    aside#examine-panel .precursor-block {
      margin-top: 1em;
      padding-top: 0.6em;
      border-top: 1px solid #2c2410;
    }
    aside#examine-panel .precursor-header {
      color: #6c5418;
      font-size: 10px;
      letter-spacing: 0.10em;
      margin-bottom: 0.5em;
    }
    aside#examine-panel .precursor-row {
      margin-bottom: 0.55em;
      padding-left: 0.5em;
      border-left: 2px solid #2c2410;
      color: #a08840;
      font-size: 11.5px;
    }
    aside#examine-panel .precursor-name { color: #d4af37; }
    aside#examine-panel .precursor-arrow { color: #5c4a1a; }
    aside#examine-panel .precursor-source { color: #b48a2c; font-style: italic; }
    aside#examine-panel .basis-doc {
      color: #5cb462;
      font-size: 9.5px;
      letter-spacing: 0.05em;
      margin-left: 0.4em;
    }
    aside#examine-panel .basis-implied {
      color: #c8a848;
      font-size: 9.5px;
      letter-spacing: 0.05em;
      margin-left: 0.4em;
    }
    aside#examine-panel .precursor-mechanism {
      color: #6c5418;
      font-size: 10.5px;
      margin-top: 0.2em;
      padding-left: 0;
    }
    aside#examine-panel .precursor-absent {
      border-top: 1px dashed #3c2e0e;
    }
    aside#examine-panel .precursor-absent-list {
      color: #8c5c2c;
      font-size: 11px;
      font-family: ui-monospace, monospace;
    }

    main#schematic-container {
      display: block;
      background-color: #050a14;
      background-image: url('Style_Referance.png');
      /* Responsive alignment of the blueprint backdrop:
         - background-size: 58% auto    matches the bar-to-bar source
                                        distance (462 px) to the cell-pit
                                        height (53.6% of viewBox) so the
                                        white horizontal bars land on the
                                        cell rim and cell floor.
         - background-position-x: 42.4% lands the building at source x=669
                                        directly above the leachate-pump
                                        centerline (sump pipe at viewBox
                                        x=700, container x = 0.467 × w).
         - background-position-y: 188%  shifts image top to image_top =
                                        -0.0252 × w so the top bar lands
                                        on the cell rim. Background-
                                        position percentages can exceed
                                        100% for fine-tuning past natural
                                        overflow alignment.
         All three values are container-width-relative, so the alignment
         tracks the SVG's responsive scaling at any viewport. */
      background-size: 58% auto;
      background-position: 42.4% 188%;
      background-repeat: no-repeat;
    }
  </style>
</head>

// ============================================================
// js/03-crystal-positions.ts — deterministic crystal-dot generator

// schematic — pre-engine placeholder for what will eventually be the
// per-cell crystal-growth model output.
//
// Design choices:
// - Active_zones is NOT a placement filter. Crystals nucleated in zones
//   that have since waned still persist (a future-miner sees ACCUMULATED
//   paragenesis since cell closure, not just the current chemistry
//   snapshot). active_zones gates only the zone TINTS in the schematic.
// - Placement uses zones.json expected_mineral_clusters: a mineral grows
//   wherever the zone has it in its expected cluster, regardless of the
//   scenario's current phase.

    posnjakite: "#3070b0", // posnjakite blue

    hydrozincite: "#d8d0c0", // off-white pearl
    cerussite: "#e8d8c0", // pale cream
    calcite: "#e0dcb8", // ivory
    // Halide-hydroxides / hydroxide-halides

    atacamite: "#1cac6c", // electric atacamite green
    // Phosphates
    pyromorphite: "#90b840", // olive-green hexagonal prisms
    struvite: "#e8e0d4", // white-prismatic
    vivianite: "#3a5fa8", // vivianite blue (oxidized)
    // Oxides

    goethite: "#9a5424", // ferric brown
    tenorite: "#1a1a1a", // black

    // Sulfides

                const cellLocalCenterY = (row + hTiles / 2) * TILE_SIZE_M;
                const worldX = geom.nativeFlankWidthM + cellLocalCenterX;
                const worldY = geom.cellTopYM + cellLocalCenterY;
                items.push({
                    id: itemId,
                    class_id: classId,
                    display_name: klass.display_name,
                    substrate_tokens: klass.substrate_tokens,
                    size_class: klass.size_class,
                    rigid: klass.rigid,
                    tile_col: col,
                    tile_row: row,
                    tile_w: wTiles,
                    tile_h: hTiles,
                    x_m: worldX,
                    y_m: worldY,
                    w_m: wTiles * TILE_SIZE_M,
                    h_m: hTiles * TILE_SIZE_M,
                });
                placedThis = true;
                break;
            }
            if (!placedThis) {
                unplaced[classId] = (unplaced[classId] ?? 0) + 1;
            }
        }
    }
    return { items, occupancy, unplaced, grid_cols: gridCols, grid_rows: gridRows, tile_size_m: TILE_SIZE_M };
}

function buildSchematicSVG(cfg, opts) {
    const zoneSpec = opts.zoneSpec ?? null;
    const scenario = opts.scenario ?? null;
    const itemSpec = opts.itemSpec ?? null;
    const mineralSpec = opts.mineralSpec ?? null;
    const sessionSeed = opts.sessionSeed ?? 0;
    // populationResult is captured here once items render so the crystal-dot
    // pass downstream can use the same placed items as host-anchor candidates.
    let placedItemsList = [];
    // Effective zone subset for tinting: when a scenario is selected, only
    // its active_zones render; otherwise (OVERVIEW mode) all zones render.
    // Crystal dot placement uses the FULL zoneSpec regardless — see
    // 03-crystal-positions.ts header for the active_zones-vs-history split.
    const activeZoneIds = scenario && scenario.active_zones
        ? new Set(scenario.active_zones)
        : null;
    // World extents in meters
    const totalWidthM = cfg.cellTopWidthM + 2 * cfg.nativeFlankWidthM;
    const cellEngineeredM = cfg.upperLayers.reduce((s, l) => s + l.thicknessM, 0) +
        cfg.lowerLayers.reduce((s, l) => s + l.thicknessM, 0);
    const liftBandM = cfg.cellDepthM - cellEngineeredM;
    const liftHeightM = liftBandM / cfg.lifts.length;
    // Padding for labels around the diagram (in meters at world scale)
    const padLeftM = 12;
    const padRightM = 22;
    const padTopM = 4;
    const padBottomM = 8;
    // Total drawable extent in meters (translated to viewBox px at 10 px/m)
    const PX_PER_M = 10;
    const worldWidthM = totalWidthM + padLeftM + padRightM;
    const worldHeightM = cfg.aboveGradeM + cfg.cellDepthM + (cfg.waterTableDepthM - cfg.cellDepthM) + padTopM + padBottomM;
    const vbW = worldWidthM * PX_PER_M;
    const vbH = worldHeightM * PX_PER_M;
    // Helpers: convert world (m) to viewBox (px). x is from-left in the world, y is from-top.
    const xWorldOrigin = padLeftM; // x origin (left edge of native flank) in world meters
    const yWorldOrigin = padTopM; // y origin (top of native ground above cap) in world meters
    const X = (mx) => (xWorldOrigin + mx) * PX_PER_M;
    const Y = (my) => (yWorldOrigin + my) * PX_PER_M;
    // Cell trapezoid vertices (cell rim at y=aboveGradeM, cell floor at y=aboveGradeM+cellDepthM)
    const cellLeftXTopM = cfg.nativeFlankWidthM;
    const cellRightXTopM = cfg.nativeFlankWidthM + cfg.cellTopWidthM;
    const inset = (cfg.cellTopWidthM - cfg.cellBottomWidthM) / 2;
    const cellLeftXBotM = cellLeftXTopM + inset;
    const cellRightXBotM = cellRightXTopM - inset;
    const cellTopYM = cfg.aboveGradeM;
    const cellBotYM = cfg.aboveGradeM + cfg.cellDepthM;
    // Build polygon path for the cell pit (used for clipping fills)
    const cellPolygon = [
        `${X(cellLeftXTopM)},${Y(cellTopYM)}`,
        `${X(cellRightXTopM)},${Y(cellTopYM)}`,
        `${X(cellRightXBotM)},${Y(cellBotYM)}`,
        `${X(cellLeftXBotM)},${Y(cellBotYM)}`,
    ].join(" ");
    // Linearly interpolate cell width at a given depth-into-cell (0..cellDepthM)
    const widthAtDepth = (mDepth) => {
        const t = mDepth / cfg.cellDepthM;

    };
    // SVG body assembly
    const parts = [];
    parts.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet" class="cross-section">`);
    parts.push(svgStyle());
    // ── Sky / above-grade background ──
    parts.push(`<rect class="sky" x="0" y="0" width="${vbW}" height="${Y(cfg.aboveGradeM)}" />`);
    // ── Native soil on either side of the cell, from grade down to bottom of view ──
    parts.push(`<rect class="native" x="0" y="${Y(cfg.aboveGradeM)}" width="${vbW}" height="${vbH - Y(cfg.aboveGradeM)}" />`);
    // ── Cell pit (clipped by the trapezoid from here on) ──
    parts.push(`<defs>`);
    parts.push(`  <clipPath id="cellClip"><polygon points="${cellPolygon}" /></clipPath>`);
    parts.push(`</defs>`);
    parts.push(`<g clip-path="url(#cellClip)">`);
    // Inside the cell: stack layers top-down
    let cursorMDepth = 0;
    // Upper engineered layers (cap + gas collection)
    for (const layer of cfg.upperLayers) {
        const yTop = cellTopYM + cursorMDepth;
        const yBot = yTop + layer.thicknessM;
        parts.push(`<rect class="${layer.cls}" x="${X(cellLeftXTopM - 2)}" y="${Y(yTop)}" width="${(cfg.cellTopWidthM + 4) * PX_PER_M}" height="${layer.thicknessM * PX_PER_M}" />`);
        cursorMDepth += layer.thicknessM;
    }
    // Waste lifts (the bulk of the cell)
    const upperLayersM = cfg.upperLayers.reduce((s, l) => s + l.thicknessM, 0);
    const lowerLayersM = cfg.lowerLayers.reduce((s, l) => s + l.thicknessM, 0);
    const liftBandTopM = upperLayersM;
    const liftBandBotM = cfg.cellDepthM - lowerLayersM;
    const liftBandHeightM = liftBandBotM - liftBandTopM;
    const perLiftM = liftBandHeightM / cfg.lifts.length;
    for (let i = 0; i < cfg.lifts.length; i++) {
        const lift = cfg.lifts[i];
        const yTop = cellTopYM + liftBandTopM + i * perLiftM;
        const yBot = yTop + perLiftM;
        parts.push(`<rect class="${lift.cls}" x="${X(cellLeftXTopM - 2)}" y="${Y(yTop)}" width="${(cfg.cellTopWidthM + 4) * PX_PER_M}" height="${perLiftM * PX_PER_M}" />`);
        // Daily cover stripe (thin pale line) above each lift except the first
        if (i > 0) {
            parts.push(`<line class="daily-cover" x1="${X(cellLeftXTopM - 2)}" y1="${Y(yTop)}" x2="${X(cellRightXTopM + 2)}" y2="${Y(yTop)}" />`);
        }
    }
    // Lower engineered layers (leachate collection + composite liner)
    cursorMDepth = liftBandBotM;
    for (const layer of cfg.lowerLayers) {
        const yTop = cellTopYM + cursorMDepth;
        parts.push(`<rect class="${layer.cls}" x="${X(cellLeftXTopM - 2)}" y="${Y(yTop)}" width="${(cfg.cellTopWidthM + 4) * PX_PER_M}" height="${layer.thicknessM * PX_PER_M}" />`);
        cursorMDepth += layer.thicknessM;
    }
    // ── Item layer ──
    // Discrete inventory items placed in the cell — appliances, batteries,
    // drywall sheets, etc. Per the boss's 2026-05-07 framing: 'track what
    // garbage is where before it breaks down.' Items render BEFORE the zone
    // overlay so the chemistry-territory tint paints over them at low
    // opacity; items still read through. Coarse-rigid items render as
    // hollow rectangles (the literal-vug aesthetic from project memory:
    // appliances ARE vugs, with internal voids that survive burial); medium
    // items render as small filled rectangles. fines class is skipped.
    if (scenario && itemSpec && typeof generatePlacedItems === "function") {
        const upperLayersMTotal = cfg.upperLayers.reduce((s, l) => s + l.thicknessM, 0);
        const lowerLayersMTotal = cfg.lowerLayers.reduce((s, l) => s + l.thicknessM, 0);
        const popGeom = {
            cellTopWidthM: cfg.cellTopWidthM,
            cellBottomWidthM: cfg.cellBottomWidthM,
            cellDepthM: cfg.cellDepthM,
            nativeFlankWidthM: cfg.nativeFlankWidthM,
            upperLayersM: upperLayersMTotal,
            lowerLayersM: lowerLayersMTotal,
            cellTopYM: cellTopYM,
        };
        const populationResult = generatePlacedItems(scenario, itemSpec, popGeom, sessionSeed);
        const items = populationResult.items;
        placedItemsList = items;
        // Stash on the global window so the boot harness's click handler can
        // resolve a clicked dot's data-host-item-id back to the full PlacedItem

            const cx = X(it.x_m);
            const cy = Y(it.y_m);
            const w = it.w_m * PX_PER_M;
            const h = it.h_m * PX_PER_M;
            const xLeft = cx - w / 2;
            const yTop = cy - h / 2;
            // Coarse-rigid items render as hollow rectangles (the vug). Mediums
            // render as semi-filled rectangles. data-item-id lets future passes
            // anchor crystals to specific items.
            const cls = `item item-${it.size_class} item-class-${it.class_id}`;
            parts.push(`<rect class="${cls}" x="${xLeft}" y="${yTop}" width="${w}" height="${h}" data-item-id="${it.id}" data-class-id="${it.class_id}"><title>${it.display_name}</title></rect>`);
        }
        parts.push(`</g>`); // end item-layer
    }

    // Composes over the lift bands and engineered layers within the trapezoid.
    // The waste body sits between liftBandTopM and liftBandBotM; depth fractions
    // in the zone spec are normalized against the FULL cellDepthM (engineered
    // layers included), matching the boss's mental model where the trapezoid
    // is the cell, top to floor. Zones are drawn IN ORDER as supplied — earlier
    // zones can be overdrawn by later ones (wall_band intentionally overdraws
    // the depth_band methanogenic_core along the slanted walls).
    if (zoneSpec) {
        parts.push(`<g class="zone-overlay">`);
        for (const id of Object.keys(zoneSpec)) {
            // Per-scenario filtering: skip zones not in active_zones when a scenario
            // is selected. OVERVIEW mode (no scenario) renders all zones.
            if (activeZoneIds && !activeZoneIds.has(id))
                continue;
            const z = zoneSpec[id];
            const cls = `zone-${z.color_visual}`;
            const stroke = z.boundary_style === "solid" ? "zone-boundary-solid" : (z.boundary_style === "none" ? "" : "zone-boundary-dashed");
            if (z.position_class === "depth_band") {
                // Polygon: 4 vertices (top-left, top-right, bottom-right, bottom-left)
                // at the requested depth fractions, restricted to the radial extent.
                const yTopM = cellTopYM + z.geometry.depth_frac_top * cfg.cellDepthM;
                const yBotM = cellTopYM + z.geometry.depth_frac_bottom * cfg.cellDepthM;
                const wTop = widthAtDepth(z.geometry.depth_frac_top * cfg.cellDepthM);
                const wBot = widthAtDepth(z.geometry.depth_frac_bottom * cfg.cellDepthM);
                const cxM = cfg.nativeFlankWidthM + cfg.cellTopWidthM / 2;
                const halfTop = (wTop.rightXM - wTop.leftXM) * z.geometry.radial_extent_frac / 2;
                const halfBot = (wBot.rightXM - wBot.leftXM) * z.geometry.radial_extent_frac / 2;
                const poly = [
                    `${X(cxM - halfTop)},${Y(yTopM)}`,
                    `${X(cxM + halfTop)},${Y(yTopM)}`,
                    `${X(cxM + halfBot)},${Y(yBotM)}`,
                    `${X(cxM - halfBot)},${Y(yBotM)}`,
                ].join(" ");
                parts.push(`<polygon class="${cls} ${stroke}" points="${poly}" />`);
            }
            else if (z.position_class === "wall_band") {
                // Two slanted bands, one per wall. At each depth, the band hugs the
                // wall on its outer edge and inset_m to the interior on its inner edge.
                // Approximation: horizontal offset by inset_m (not strictly perpendicular
                // to the slanted wall — close enough for a 12 m / 30 m slope).
                const inset = z.geometry.inset_m;
                // Left wall: from (cellLeftXTopM, cellTopYM) to (cellLeftXBotM, cellBotYM)
                const leftPoly = [
                    `${X(cellLeftXTopM)},${Y(cellTopYM)}`,
                    `${X(cellLeftXTopM + inset)},${Y(cellTopYM)}`,
                    `${X(cellLeftXBotM + inset)},${Y(cellBotYM)}`,
                    `${X(cellLeftXBotM)},${Y(cellBotYM)}`,
                ].join(" ");
                const rightPoly = [
                    `${X(cellRightXTopM - inset)},${Y(cellTopYM)}`,
                    `${X(cellRightXTopM)},${Y(cellTopYM)}`,
                    `${X(cellRightXBotM)},${Y(cellBotYM)}`,
                    `${X(cellRightXBotM - inset)},${Y(cellBotYM)}`,
                ].join(" ");
                parts.push(`<polygon class="${cls} ${stroke}" points="${leftPoly}" />`);
                parts.push(`<polygon class="${cls} ${stroke}" points="${rightPoly}" />`);
            }
            else if (z.position_class === "bottom_strip") {

                // The LCS sits at cellBotYM - lowerLayersM, thicknessM = lowerLayers[0].thicknessM.
                const yTopM = cellBotYM - cfg.lowerLayers.reduce((s, l) => s + l.thicknessM, 0);

                const wBot = widthAtDepth(yTopM - cellTopYM + tM);

                    `${X(wTop.leftXM)},${Y(yTopM)}`,
                    `${X(wTop.rightXM)},${Y(yTopM)}`,
                    `${X(wBot.rightXM)},${Y(yTopM + tM)}`,
                    `${X(wBot.leftXM)},${Y(yTopM + tM)}`,

        }

        // on the existing right-side LCS layer-label).
        for (const id of Object.keys(zoneSpec)) {

            const z = zoneSpec[id];
            const cls = `zone-label zone-label-${z.color_visual}`;
            if (z.position_class === "depth_band") {

                const cxM = cfg.nativeFlankWidthM + cfg.cellTopWidthM / 2;

                // the methanogenic_core for readability while still reading as the

                continue;
            const ext = ev.spatial_extent;
            const centerCol = ext.center_tile[0];
            const centerRow = ext.center_tile[1];

            const cxM = cfg.nativeFlankWidthM + (centerCol + 0.5);
            const cyM = cellTopYM + (centerRow + 0.5);
            const cxPx = X(cxM);
            const cyPx = Y(cyM);
            // Tile units = 1 m = PX_PER_M pixels.
            const rBurn = (ext.radius_burning_tiles ?? 0) * PX_PER_M;
            const rHalo = (ext.radius_halo_tiles ?? 0) * PX_PER_M;
            const rFrozen = (ext.radius_frozen_tiles ?? 0) * PX_PER_M;
            // Frozen-metastable scar (outermost, paint first so halo + core
            // sit on top).
            if (rFrozen > rHalo) {
                parts.push(`<circle class="event-frozen" cx="${cxPx}" cy="${cyPx}" r="${rFrozen}" data-event-id="${ev.id}" data-state="frozen_metastable" />`);
            }
            // Halo annulus.
            if (rHalo > rBurn) {
                parts.push(`<circle class="event-halo" cx="${cxPx}" cy="${cyPx}" r="${rHalo}" data-event-id="${ev.id}" data-state="halo" />`);
            }
            // Burning core (innermost, hottest).
            if (rBurn > 0) {
                parts.push(`<circle class="event-burning" cx="${cxPx}" cy="${cyPx}" r="${rBurn}" data-event-id="${ev.id}" data-state="burning" />`);
            }

            const labelY = cyPx - rFrozen - 4;
            const labelText = (ev.type ?? "event").toString().toUpperCase().replace(/_/g, " ");

        }
        parts.push(`</g>`); // end event-overlay

    // Placeholder for the future per-cell crystal-growth output. Generates

    if (scenario && zoneSpec && typeof generateCrystalDots === "function") {

        const geom = {

            const hostId = d.host_item_id ?? "";
            const hostClass = d.host_item_class ?? "";
            const eventId = d.event_id ?? "";
            const eventState = d.event_state ?? "";
            parts.push(`<circle class="dot dot-${d.mineral_id} dot-${d.evidence_role}" cx="${X(d.x_m)}" cy="${Y(d.y_m)}" r="${r}" fill="${fill}" data-mineral-id="${d.mineral_id}" data-zone-id="${d.zone_id}" data-evidence-role="${d.evidence_role}" data-host-item-id="${hostId}" data-host-item-class="${hostClass}" data-event-id="${eventId}" data-event-state="${eventState}" />`);
        }
        parts.push(`</g>`); // end crystal-dots group
    }
    parts.push(`</g>`); // end cellClip group
    // Cell pit outline (the engineered boundary)
    parts.push(`<polygon class="pit-outline" points="${cellPolygon}" />`);
    // ── Side annotations (NOT clipped to the pit) ──
    // Gas extraction wells (vertical from cap surface down ~80% of cell)
    for (const xf of cfg.gasVentXFractions) {
        const xWell = cellLeftXTopM + xf * cfg.cellTopWidthM;
        const yTopWell = cellTopYM - 1; // sticks up above cap
        const yBotWell = cellTopYM + cfg.cellDepthM * 0.8;
        parts.push(`<line class="gas-well" x1="${X(xWell)}" y1="${Y(yTopWell)}" x2="${X(xWell)}" y2="${Y(yBotWell)}" />`);
        // Wellhead box at top
        parts.push(`<rect class="well-head" x="${X(xWell) - 6}" y="${Y(yTopWell) - 6}" width="12" height="6" />`);
        parts.push(`<text class="annot-label" x="${X(xWell)}" y="${Y(yTopWell) - 9}" text-anchor="middle">GAS</text>`);
    }
    // Monitoring wells (in native flank, both sides)

    const mw2xM = cellRightXTopM + cfg.monitoringWellXOffsetsM[1];
    for (const mxM of [mw1xM, mw2xM]) {
        parts.push(`<line class="monitoring-well" x1="${X(mxM)}" y1="${Y(cfg.aboveGradeM - 1)}" x2="${X(mxM)}" y2="${Y(cfg.waterTableDepthM)}" />`);
        parts.push(`<circle class="well-screen" cx="${X(mxM)}" cy="${Y(cfg.waterTableDepthM - 0.5)}" r="3" />`);
        parts.push(`<rect class="well-head" x="${X(mxM) - 6}" y="${Y(cfg.aboveGradeM - 2)}" width="12" height="6" />`);
        parts.push(`<text class="annot-label" x="${X(mxM)}" y="${Y(cfg.aboveGradeM - 4)}" text-anchor="middle">MW</text>`);
    }
    // Leachate sump (small box at bottom-center of cell, just above lower layers)
    const sumpCxM = cfg.nativeFlankWidthM + cfg.cellTopWidthM / 2;
    const sumpCyM = cellBotYM - lowerLayersM - 0.3;
    parts.push(`<rect class="sump" x="${X(sumpCxM) - 8}" y="${Y(sumpCyM) - 5}" width="16" height="6" />`);
    parts.push(`<line class="sump-pipe" x1="${X(sumpCxM)}" y1="${Y(sumpCyM)}" x2="${X(sumpCxM)}" y2="${Y(cfg.aboveGradeM - 1)}" />`);
    parts.push(`<text class="annot-label" x="${X(sumpCxM)}" y="${Y(cfg.aboveGradeM - 4)}" text-anchor="middle">LEACHATE PUMP</text>`);
    // Perforated leachate collection pipe (horizontal dashed line through LCS layer)

        var list = (typeof LAST_PLACED_ITEMS !== "undefined") ? LAST_PLACED_ITEMS : null;
        if (!list) return null;
        for (var i = 0; i < list.length; i++) {
          if (list[i].id === hostItemId) return list[i];
        }
        return null;
      }

      // Examination-panel click delegation: any crystal dot inside the
      // schematic container, when clicked, populates the panel below with
      // the mineral's paragenesis. Uses event delegation so re-renders
      // (which replace the SVG entirely) don't need to re-bind.
      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return ({"&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"})[c];
        });
      }
      function clearSelectedDot() {
        var prev = document.querySelector("circle.dot.selected");
        if (prev) prev.classList.remove("selected");
      }
      function renderIdlePanel(reason) {
        var panel = document.getElementById("examine-panel");
        if (!panel) return;
        panel.innerHTML =
          '<div class="header">EXAMINATION ROOM — IDLE</div>' +
          '<div class="idle">' + escapeHtml(reason) + '</div>';
      }
      function renderExamination(target) {
        var panel = document.getElementById("examine-panel");
        if (!panel) return;
        var mineralId = target.getAttribute("data-mineral-id");
        var zoneId = target.getAttribute("data-zone-id");
        if (!mineralId || !zoneId) return;
        if (!activeScenarioId) {
          renderIdlePanel("Examined a crystal in OVERVIEW mode — select a scenario above to read its paragenesis in context.");
          return;
        }
        var scenario = (typeof SCENARIO_SPEC !== "undefined" && SCENARIO_SPEC) ? SCENARIO_SPEC[activeScenarioId] : null;
        var mineralEntry = (typeof MINERAL_SPEC !== "undefined" && MINERAL_SPEC) ? MINERAL_SPEC[mineralId] : null;
        var zoneEntry = (typeof ZONE_SPEC !== "undefined" && ZONE_SPEC) ? ZONE_SPEC[zoneId] : null;
        var precursorSpec = (typeof PRECURSOR_SPEC !== "undefined" && PRECURSOR_SPEC) ? PRECURSOR_SPEC : null;
        if (typeof narrateCrystal !== "function") {
          renderIdlePanel("Narrator module not loaded.");
          return;
        }
        var hostItemId = target.getAttribute("data-host-item-id") || "";
        var hostItem = lookupHostItem(hostItemId);
        // Event context (v10): burn-overlay dots carry data-event-id +
        // data-event-state. Resolve the event entry from the scenario's
        // events[] array so burn narrators can name the specific fire.
        var eventId = target.getAttribute("data-event-id") || "";
        var eventState = target.getAttribute("data-event-state") || "";
        var eventEntry = null;
        if (eventId && scenario && Array.isArray(scenario.events)) {
          for (var ei = 0; ei < scenario.events.length; ei++) {
            if (scenario.events[ei].id === eventId) { eventEntry = scenario.events[ei]; break; }
          }
        }
        var narrative = narrateCrystal(mineralId, scenario, zoneId, mineralEntry, zoneEntry, precursorSpec, hostItem, eventEntry, eventState || null);
        var cellName = scenario && scenario.location ? (scenario.location.locality + ", " + scenario.location.country) : "(no scenario)";
        var citationsHtml = narrative.citations.length
          ? '<div class="citations">citations: ' + narrative.citations.map(escapeHtml).join("; ") + '</div>'
          : "";
        var hostLine = narrative.host_item_label
          ? '<span class="divider">|</span><span class="label">host:</span> ' + escapeHtml(narrative.host_item_label)
          : '<span class="divider">|</span><span class="label">host:</span> <span class="host-none">(no specific host — zone-fallback placement)</span>';
        var evidenceLine = '<span class="label">zone:</span> ' + escapeHtml(narrative.zoneLabel) +
          '<span class="divider">|</span>' +
          '<span class="label">habit:</span> ' + escapeHtml(narrative.habit) +
          '<span class="divider">|</span>' +
          '<span class="label">evidence:</span> ' + escapeHtml(narrative.evidenceRole) +
          hostLine;
        var fallbackHtml = narrative.authored ? "" :
          '<div class="fallback-note">[ narrator placeholder — per-mineral paragenesis for this catalog entry not yet authored, prose reconstructed from catalog data ]</div>';

        // Precursor origins panel: show which substrates the narrative
        // composed from (with evidence basis) and which precursors were
        // omitted because their source substrate is not in this cell's
        // inventory. Boss design 2026-05-07: paragenesis must name origins.
        var precursorRows = "";
        if (narrative.available_precursors && narrative.available_precursors.length) {
          precursorRows += '<div class="precursor-block"><div class="precursor-header">PRECURSOR ORIGINS — confirmed in this cell\'s inventory</div>';
          for (var i = 0; i < narrative.available_precursors.length; i++) {
            var ap = narrative.available_precursors[i];
            var basisTag = ap.basis === "documented"
              ? '<span class="basis-doc">[documented]</span>'
              : (ap.basis === "implied_typical_msw" ? '<span class="basis-implied">[implied typical MSW]</span>' : '<span class="basis-doc">[' + escapeHtml(ap.basis) + ']</span>');
            precursorRows +=
              '<div class="precursor-row">' +
                '<span class="precursor-name">' + escapeHtml(ap.precursor.species) + '</span> ' +
                '<span class="precursor-arrow">←</span> ' +
                '<span class="precursor-source">' + escapeHtml(ap.source_substrate) + '</span> ' +
                basisTag +
                '<div class="precursor-mechanism">' + escapeHtml(ap.precursor.decay_mechanism) + '</div>' +
              '</div>';
          }
          precursorRows += '</div>';
        }
        if (narrative.absent_precursors && narrative.absent_precursors.length) {
          precursorRows += '<div class="precursor-block precursor-absent"><div class="precursor-header">PRECURSORS OMITTED — source substrate not in this cell\'s inventory</div>';
          precursorRows += '<div class="precursor-absent-list">' + narrative.absent_precursors.map(escapeHtml).join(", ") + '</div>';
          precursorRows += '</div>';
        }

        panel.innerHTML =
          '<div class="header">EXAMINATION ROOM — ' + escapeHtml(cellName.toUpperCase()) + '</div>' +
          '<div><span class="mineral-name">' + escapeHtml(narrative.mineralName) + '</span>' +
            '<span class="mineral-formula">' + escapeHtml(narrative.formula) + '</span></div>' +
          '<div class="meta">' + evidenceLine + '</div>' +
          '<div class="paragenesis">' + escapeHtml(narrative.paragenesis) + '</div>' +
          fallbackHtml +
          precursorRows +
          citationsHtml;
      }
      document.getElementById("schematic-container").addEventListener("click", function (ev) {
        var t = ev.target;
        if (!t || !t.classList || !t.classList.contains("dot")) return;
        clearSelectedDot();
        t.classList.add("selected");
        renderExamination(t);
      });

      function tryBuildScenarioSelector() {
        var zonesReady = typeof ZONE_SPEC !== "undefined" && ZONE_SPEC !== null;
        var scenariosReady = typeof SCENARIO_SPEC !== "undefined" && SCENARIO_SPEC !== null;
        if (!zonesReady || !scenariosReady) return;
        var nav = document.getElementById("scenario-selector");
        if (!nav || nav.dataset.built === "1") return;
        nav.dataset.built = "1";

        // BEGIN buttons: clicking transitions to cell view + (for scenarios)
        // generates a fresh session seed so each press scrambles the item
        // and crystal layout. The 'active' class is unused on the title
        // screen since selection ends the begin-menu state.
        function makeBtn(id, label) {
          var b = document.createElement("button");
          b.textContent = label;
          b.dataset.scenarioId = id || "";
          b.addEventListener("click", function () {
            beginScenario(id || null);
          });
          return b;
        }

        // Order: scenarios first (the primary verbs), OVERVIEW third (the
        // analytical / no-cell view). Boss design 2026-05-07.
        var ids = Object.keys(SCENARIO_SPEC);
        for (var i = 0; i < ids.length; i++) {
          var s = SCENARIO_SPEC[ids[i]];
          var label = "[ " + s.location.locality.toUpperCase() + " ]";
          nav.appendChild(makeBtn(ids[i], label));
        }
        nav.appendChild(makeBtn("", "[ OVERVIEW ]"));
      }
    })();
  </script>
</body>
</html>
